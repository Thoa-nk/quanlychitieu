<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ChiTiêuViz • Quản lý chi tiêu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
    
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      background: #0a0a0f;
      color: #e2e8f0;
    }
    .logo { font-family: 'Space Grotesk', sans-serif; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); }
    .chart-container { height: 240px; }
    @media (min-width: 640px) { .chart-container { height: 300px; } }
  </style>
</head>
<body class="min-h-screen pb-20">

<div class="max-w-7xl mx-auto p-4 sm:p-6">

  <!-- Header -->
  <div class="flex justify-between items-center mb-8">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-emerald-400 rounded-2xl flex items-center justify-center">
        <i class="fa-solid fa-chart-pie text-black text-2xl"></i>
      </div>
      <div>
        <h1 class="logo text-3xl font-semibold tracking-tight">ChiTiêuViz</h1>
        <p class="text-xs text-gray-400">Quản lý chi tiêu thông minh</p>
      </div>
    </div>
    <button onclick="showAddModal()" 
            class="bg-gradient-to-r from-cyan-400 to-emerald-400 text-black font-semibold px-6 py-3 rounded-3xl flex items-center gap-2">
      <i class="fa-solid fa-plus"></i>
      <span>Thêm thu/chi</span>
    </button>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-2 gap-4 mb-8">
    <div class="glass rounded-3xl p-6">
      <p class="text-emerald-400 text-sm">TỔNG THU</p>
      <p id="totalIncome" class="text-3xl font-semibold mt-3">0 ₫</p>
    </div>
    <div class="glass rounded-3xl p-6">
      <p class="text-rose-400 text-sm">TỔNG CHI</p>
      <p id="totalExpense" class="text-3xl font-semibold mt-3">0 ₫</p>
    </div>
  </div>

  <!-- Biểu đồ -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="glass rounded-3xl p-6">
      <h2 class="font-semibold mb-5">Phân bổ chi tiêu</h2>
      <div class="chart-container"><canvas id="pieChart"></canvas></div>
    </div>

    <div class="glass rounded-3xl p-6">
      <h2 class="font-semibold mb-5">Chi theo danh mục</h2>
      <div class="chart-container"><canvas id="barChart"></canvas></div>
    </div>

    <div class="glass rounded-3xl p-6 lg:col-span-2">
      <h2 class="font-semibold mb-5">Xu hướng thu - chi</h2>
      <div class="chart-container" style="height: 280px;"><canvas id="lineChart"></canvas></div>
    </div>
  </div>

  <!-- Giao dịch gần đây -->
  <div class="mt-10 glass rounded-3xl p-6">
    <h2 class="font-semibold mb-6">Giao dịch gần đây</h2>
    <div id="transactionList" class="space-y-4"></div>
  </div>
</div>

<!-- MODAL THÊM THU/CHI -->
<div id="addModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
  <div class="glass w-full max-w-md mx-4 rounded-3xl p-6">
    <h2 class="text-2xl font-semibold mb-6 text-center">Thêm khoản thu / chi</h2>
    
    <div class="space-y-6">
      <div>
        <label class="text-sm text-gray-400 block mb-2">Loại giao dịch</label>
        <div class="grid grid-cols-2 gap-3">
          <button onclick="selectType(this, 'expense')" id="btn-expense"
                  class="py-4 rounded-2xl border-2 border-rose-500 text-rose-400 font-medium active flex items-center justify-center gap-2">
            <i class="fa-solid fa-arrow-down"></i> CHI TIÊU
          </button>
          <button onclick="selectType(this, 'income')" id="btn-income"
                  class="py-4 rounded-2xl border-2 border-emerald-500 text-emerald-400 font-medium flex items-center justify-center gap-2">
            <i class="fa-solid fa-arrow-up"></i> THU NHẬP
          </button>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-sm text-gray-400 block mb-2">Số tiền (₫)</label>
          <input id="amount" type="text" placeholder="500000" 
                 class="w-full bg-white/10 border border-white/20 rounded-2xl px-4 py-3 focus:outline-none">
        </div>
        <div>
          <label class="text-sm text-gray-400 block mb-2">Ngày</label>
          <input id="date" type="date" value="2026-04-16" 
                 class="w-full bg-white/10 border border-white/20 rounded-2xl px-4 py-3">
        </div>
      </div>

      <div>
        <label class="text-sm text-gray-400 block mb-2">Danh mục</label>
        <select id="category" class="w-full bg-white/10 border border-white/20 rounded-2xl px-4 py-3"></select>
      </div>

      <div>
        <label class="text-sm text-gray-400 block mb-2">Ghi chú</label>
        <input id="note" type="text" placeholder="Mua cà phê sáng" 
               class="w-full bg-white/10 border border-white/20 rounded-2xl px-4 py-3">
      </div>
    </div>

    <div class="flex gap-3 mt-8">
      <button onclick="hideAddModal()" class="flex-1 py-4 border border-white/30 rounded-3xl font-medium">Hủy</button>
      <button onclick="addTransaction()" class="flex-1 py-4 bg-gradient-to-r from-cyan-400 to-emerald-400 text-black font-semibold rounded-3xl">Lưu</button>
    </div>
  </div>
</div>

<script>
// ==================== DỮ LIỆU 30 GIAO DỊCH ====================
let transactions = [
  {id:1, date:"2026-04-01", type:"expense", amount:450000, category:"Ăn uống", note:"Ăn trưa cơm tấm"},
  {id:2, date:"2026-04-02", type:"income", amount:12000000, category:"Lương", note:"Lương tháng 4"},
  {id:3, date:"2026-04-03", type:"expense", amount:120000, category:"Di chuyển", note:"Xăng xe"},
  {id:4, date:"2026-04-04", type:"expense", amount:890000, category:"Mua sắm", note:"Quần áo"},
  {id:5, date:"2026-04-05", type:"expense", amount:350000, category:"Giải trí", note:"Netflix"},
  {id:6, date:"2026-04-06", type:"expense", amount:650000, category:"Nhà cửa", note:"Tiền điện nước"},
  // ... (bạn có thể giữ nguyên 30 giao dịch cũ của bạn)
];

const expenseCategories = ["Ăn uống", "Di chuyển", "Nhà cửa", "Mua sắm", "Giải trí", "Sức khỏe", "Giáo dục", "Khác"];
const incomeCategories = ["Lương", "Thưởng", "Tiết kiệm", "Khác"];

let pieChart, barChart, lineChart;

// ==================== MODAL ====================
let currentType = 'expense';

function showAddModal() {
  document.getElementById('addModal').classList.remove('hidden');
  document.getElementById('addModal').classList.add('flex');
  selectType(document.getElementById('btn-expense'), 'expense');
}

function hideAddModal() {
  document.getElementById('addModal').classList.add('hidden');
  document.getElementById('addModal').classList.remove('flex');
}

function selectType(btn, type) {
  currentType = type;
  document.getElementById('btn-expense').classList.remove('active', 'border-rose-500');
  document.getElementById('btn-income').classList.remove('active', 'border-emerald-500');
  btn.classList.add('active');

  const select = document.getElementById('category');
  select.innerHTML = '';
  const cats = type === 'expense' ? expenseCategories : incomeCategories;
  cats.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = cat;
    select.appendChild(opt);
  });
}

function addTransaction() {
  const amount = parseInt(document.getElementById('amount').value.replace(/[^0-9]/g,'')) || 0;
  if (amount <= 0) return alert("Vui lòng nhập số tiền!");

  const newTrans = {
    id: Date.now(),
    date: document.getElementById('date').value,
    type: currentType,
    amount: amount,
    category: document.getElementById('category').value,
    note: document.getElementById('note').value || "Giao dịch mới"
  };

  transactions.unshift(newTrans);
  hideAddModal();
  updateAllCharts();

  // Toast
  const toast = document.createElement('div');
  toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-500 text-black px-8 py-3 rounded-3xl font-medium shadow-2xl';
  toast.textContent = '✅ Đã thêm giao dịch!';
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

// ==================== CẬP NHẬT TẤT CẢ ====================
function updateAllCharts() {
  const filtered = transactions; // Có thể thêm filter sau

  // Tính tổng thu chi
  let totalIncome = 0, totalExpense = 0;
  filtered.forEach(t => {
    if (t.type === "income") totalIncome += t.amount;
    else totalExpense += t.amount;
  });

  document.getElementById("totalIncome").textContent = totalIncome.toLocaleString('vi-VN') + " ₫";
  document.getElementById("totalExpense").textContent = totalExpense.toLocaleString('vi-VN') + " ₫";

  // Phân bổ chi tiêu (Pie)
  const categoryExpense = {};
  filtered.filter(t => t.type === "expense").forEach(t => {
    categoryExpense[t.category] = (categoryExpense[t.category] || 0) + t.amount;
  });

  if (pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById("pieChart"), {
    type: 'doughnut',
    data: {
      labels: Object.keys(categoryExpense),
      datasets: [{ 
        data: Object.values(categoryExpense),
        backgroundColor: ['#f59e0b','#3b82f6','#8b5cf6','#ec4899','#14b8a6']
      }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } }}
  });

  // Bar Chart
  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
      labels: Object.keys(categoryExpense),
      datasets: [{ label: 'Chi tiêu', data: Object.values(categoryExpense), backgroundColor: "#6366f1", borderRadius: 8 }]
    },
    options: { responsive: true, maintainAspectRatio: false }
  });

  // Line Chart (đơn giản)
  if (lineChart) lineChart.destroy();
  lineChart = new Chart(document.getElementById("lineChart"), {
    type: 'line',
    data: {
      labels: ['01/04', '05/04', '10/04', '15/04', '20/04', '25/04'],
      datasets: [
        { label: 'Thu', data: [12000000, 800000, 0, 500000, 0, 300000], borderColor: "#10b981", tension: 0.4 },
        { label: 'Chi', data: [450000, 120000, 890000, 350000, 650000, 420000], borderColor: "#ef4444", tension: 0.4 }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false }
  });

  // Render danh sách giao dịch
  renderTransactionList(filtered);
}

function renderTransactionList(filtered) {
  const container = document.getElementById("transactionList");
  container.innerHTML = "";

  filtered.slice(0, 10).forEach(t => {
    const isIncome = t.type === "income";
    const div = document.createElement("div");
    div.className = `flex items-center justify-between p-4 rounded-2xl ${isIncome ? 'bg-emerald-900/30' : 'bg-rose-900/30'}`;
    div.innerHTML = `
      <div>
        <div class="font-medium">${t.note}</div>
        <div class="text-xs text-gray-400">${t.date} • ${t.category}</div>
      </div>
      <div class="font-semibold ${isIncome ? 'text-emerald-400' : 'text-rose-400'}">
        ${isIncome ? '+' : '-'}${t.amount.toLocaleString('vi-VN')} ₫
      </div>
    `;
    container.appendChild(div);
  });
}

// Khởi chạy khi load trang
window.onload = () => {
  updateAllCharts();
};
</script>
</body>
</html>
