!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi Tiêu Cá Nhân</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family:'Segoe UI',system-ui,sans-serif; }
    .chart-container { position:relative; height:260px; }
    @media(min-width:1024px){ .chart-container{ height:340px; } }
    .stat-value { font-size:1.5rem; line-height:1.25; }
    #toast { transition:opacity 0.5s ease; pointer-events:none; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen pb-24">

<!-- ── LOADING ── -->
<div id="loadingScreen" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
  <i class="fa-solid fa-wallet text-indigo-500 text-4xl mb-4 animate-pulse"></i>
  <p class="text-gray-400 text-sm">Đang tải dữ liệu...</p>
</div>

<!-- ── APP ── -->
<div id="appScreen" class="hidden max-w-7xl mx-auto p-4 sm:p-6">

  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
    <div>
      <h1 class="text-2xl sm:text-3xl font-bold text-indigo-700 flex items-center gap-3">
        <i class="fa-solid fa-wallet"></i> Chi Tiêu Cá Nhân
      </h1>
      <p class="text-gray-400 text-sm mt-1">Dữ liệu lưu trên Firebase Cloud</p>
    </div>
    <div class="flex flex-wrap gap-2">
      <select id="filterMonth"
        class="bg-white border border-gray-200 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-400">
        <option value="">Tất cả</option>
        <option value="2026-04">Tháng 4/2026</option>
        <option value="2026-03">Tháng 3/2026</option>
        <option value="2026-02">Tháng 2/2026</option>
        <option value="2026-01">Tháng 1/2026</option>
      </select>
      <button onclick="setSortField('date')"
        class="bg-white border border-gray-200 hover:border-indigo-400 px-4 py-2.5 rounded-2xl text-sm flex items-center gap-1.5 transition-all">
        <i class="fa-solid fa-calendar-days text-indigo-400"></i> Ngày
      </button>
      <button onclick="setSortField('amount')"
        class="bg-white border border-gray-200 hover:border-indigo-400 px-4 py-2.5 rounded-2xl text-sm flex items-center gap-1.5 transition-all">
        <i class="fa-solid fa-arrow-up-wide-short text-indigo-400"></i> Số tiền
      </button>
    </div>
  </div>

  <!-- KPI Cards -->
  <div class="grid grid-cols-2 gap-4 mb-6">
    <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
      <p class="text-xs text-gray-400">Tổng thu</p>
      <p id="totalIncome" class="stat-value font-semibold text-emerald-600 mt-1">0 đ</p>
    </div>
    <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
      <p class="text-xs text-gray-400">Tổng chi</p>
      <p id="totalExpense" class="stat-value font-semibold text-rose-500 mt-1">0 đ</p>
    </div>
    <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
      <p class="text-xs text-gray-400">Số dư</p>
      <p id="netBalance" class="stat-value font-semibold text-indigo-600 mt-1">0 đ</p>
    </div>
    <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
      <p class="text-xs text-gray-400">Giao dịch</p>
      <p id="txCount" class="stat-value font-semibold text-gray-700 mt-1">0</p>
    </div>
  </div>

  <!-- Charts -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-6">
    <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
      <h2 class="font-semibold mb-4 flex items-center gap-2 text-gray-700">
        <i class="fa-solid fa-chart-pie text-indigo-500"></i> Phân bổ chi tiêu
      </h2>
      <div class="chart-container"><canvas id="pieChart"></canvas></div>
    </div>
    <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
      <h2 class="font-semibold mb-4 flex items-center gap-2 text-gray-700">
        <i class="fa-solid fa-chart-column text-indigo-500"></i> Chi theo danh mục
      </h2>
      <div class="chart-container"><canvas id="barChart"></canvas></div>
    </div>
    <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 lg:col-span-2">
      <h2 class="font-semibold mb-4 flex items-center gap-2 text-gray-700">
        <i class="fa-solid fa-chart-line text-indigo-500"></i> Xu hướng thu - chi
      </h2>
      <div class="chart-container" style="height:300px"><canvas id="lineChart"></canvas></div>
    </div>
  </div>

  <!-- Transaction List -->
  <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
    <h2 class="font-semibold mb-5 flex items-center gap-2 text-gray-700">
      <i class="fa-solid fa-clock-rotate-left text-indigo-500"></i> Giao dịch gần đây
    </h2>
    <div id="txList" class="space-y-3 max-h-[460px] overflow-y-auto pr-1"></div>
  </div>
</div>

<!-- FAB -->
<button onclick="openModal()"
  class="fixed bottom-6 right-6 w-14 h-14 bg-indigo-600 hover:bg-indigo-700
         text-white rounded-full shadow-xl text-2xl z-40 flex items-center justify-center
         transition-all hover:scale-110 active:scale-95">
  <i class="fa-solid fa-plus"></i>
</button>

<!-- MODAL -->
<div id="modal"
  class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50
         flex items-end sm:items-center justify-center p-4"
  onclick="if(event.target===this)closeModal()">
  <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl">

    <div class="flex items-center justify-between mb-5">
      <h3 class="text-lg font-bold text-gray-800">
        <i class="fa-solid fa-plus-circle text-indigo-500 mr-2"></i>Thêm giao dịch
      </h3>
      <button onclick="closeModal()"
        class="w-8 h-8 rounded-xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-400 transition-all">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <!-- Type toggle -->
    <div class="flex gap-2 mb-5 bg-gray-100 p-1 rounded-2xl">
      <button id="btnExpense" onclick="setType('expense')"
        class="flex-1 py-2.5 rounded-xl text-sm font-semibold bg-rose-500 text-white transition-all">
        <i class="fa-solid fa-arrow-trend-down mr-1"></i>Chi tiêu
      </button>
      <button id="btnIncome" onclick="setType('income')"
        class="flex-1 py-2.5 rounded-xl text-sm font-semibold text-gray-500 hover:text-gray-700 transition-all">
        <i class="fa-solid fa-arrow-trend-up mr-1"></i>Thu nhập
      </button>
    </div>
    <input type="hidden" id="t_type" value="expense">

    <div class="space-y-3">
      <div>
        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wide block mb-1">Số tiền (đ)</label>
        <input id="t_amount" type="number" min="1000" step="1000" placeholder="vd: 150000"
          class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-lg font-semibold
                 focus:outline-none focus:border-indigo-400 transition-all">
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wide block mb-1">Danh mục</label>
        <select id="t_category"
          class="w-full border border-gray-200 rounded-2xl px-4 py-3 focus:outline-none focus:border-indigo-400 transition-all">
        </select>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wide block mb-1">Ghi chú</label>
        <input id="t_note" type="text" placeholder="vd: Ăn trưa cơm tấm"
          class="w-full border border-gray-200 rounded-2xl px-4 py-3 focus:outline-none focus:border-indigo-400 transition-all">
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wide block mb-1">Ngày</label>
        <input id="t_date" type="date"
          class="w-full border border-gray-200 rounded-2xl px-4 py-3 focus:outline-none focus:border-indigo-400 transition-all">
      </div>
    </div>

    <button id="btnAdd" onclick="addTransaction()"
      class="w-full mt-5 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold
             py-4 rounded-2xl flex items-center justify-center gap-2 transition-all active:scale-95">
      <i class="fa-solid fa-check mr-1"></i>Lưu giao dịch
    </button>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-2xl
     text-sm font-medium shadow-lg text-white opacity-0 hidden"></div>

<!-- ================================================================
     FIREBASE + LOGIC
================================================================ -->
<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs,
         deleteDoc, doc, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── CONFIG ────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyBRJduTlrUaU4h8OUYTGOcMPeOCZitACQE",
  authDomain:        "quanlychitieu-f1eb6.firebaseapp.com",
  projectId:         "quanlychitieu-f1eb6",
  storageBucket:     "quanlychitieu-f1eb6.firebasestorage.app",
  messagingSenderId: "601182721049",
  appId:             "1:601182721049:web:52a1d86511cf16201c8688"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const COL = collection(db, "transactions"); // collection duy nhất, không cần auth

// ── STATE ─────────────────────────────────────────────────────
let transactions = [];
let pieChart, barChart, lineChart;
let sortField = "date", sortDir = -1;

const CAT_COLORS = {
  "Ăn uống":"#f59e0b","Di chuyển":"#3b82f6","Nhà cửa":"#8b5cf6",
  "Mua sắm":"#ec4899","Giải trí":"#14b8a6","Sức khỏe":"#ef4444",
  "Giáo dục":"#6366f1","Lương":"#10b981","Thưởng":"#22c55e","Tiết kiệm":"#eab308"
};
const CATS = Object.keys(CAT_COLORS);

// ── HELPERS ───────────────────────────────────────────────────
const fmt  = n  => (+n).toLocaleString("vi-VN") + " đ";
const esc  = s  => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const setText = (id, v) => { const e=document.getElementById(id); if(e) e.textContent=v; };

function toast(msg, ok=true) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `fixed bottom-24 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-2xl
    text-sm font-medium shadow-lg text-white ${ok?"bg-emerald-500":"bg-rose-500"}`;
  t.classList.remove("hidden");
  t.style.opacity = "1";
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity="0"; setTimeout(()=>t.classList.add("hidden"),500); }, 2800);
}

// ── LOAD ──────────────────────────────────────────────────────
async function loadAll() {
  try {
    const q    = query(COL, orderBy("date","desc"));
    const snap = await getDocs(q);
    transactions = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  } catch(e) {
    // Firestore rules mới — thử không orderBy
    const snap = await getDocs(COL);
    transactions = snap.docs.map(d => ({ id:d.id, ...d.data() }))
      .sort((a,b)=> a.date<b.date ? 1:-1);
  }
  renderAll();
  document.getElementById("loadingScreen").classList.add("hidden");
  document.getElementById("appScreen").classList.remove("hidden");
}

// ── ADD ───────────────────────────────────────────────────────
window.addTransaction = async () => {
  const date     = document.getElementById("t_date").value;
  const type     = document.getElementById("t_type").value;
  const amount   = parseFloat(document.getElementById("t_amount").value);
  const category = document.getElementById("t_category").value;
  const note     = document.getElementById("t_note").value.trim();

  if (!date||!amount||isNaN(amount)||amount<=0||!category||!note) {
    toast("Vui lòng điền đầy đủ thông tin!", false); return;
  }

  const btn = document.getElementById("btnAdd");
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Đang lưu...';

  try {
    const data = { date, type, amount, category, note, createdAt: serverTimestamp() };
    const ref  = await addDoc(COL, data);
    transactions.unshift({ id:ref.id, ...data });
    closeModal();
    renderAll();
    toast("Đã lưu giao dịch!");
  } catch(e) {
    toast("Lỗi: " + e.message, false);
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-check mr-1"></i>Lưu giao dịch';
  }
};

// ── DELETE ────────────────────────────────────────────────────
window.deleteTransaction = async (id) => {
  if (!confirm("Xóa giao dịch này?")) return;
  try {
    await deleteDoc(doc(db, "transactions", id));
    transactions = transactions.filter(t=>t.id!==id);
    renderAll();
    toast("Đã xóa!");
  } catch(e) { toast("Lỗi xóa: "+e.message, false); }
};

// ── RENDER ────────────────────────────────────────────────────
function getFiltered() {
  const m = document.getElementById("filterMonth")?.value || "";
  return m ? transactions.filter(t=>t.date?.startsWith(m)) : [...transactions];
}

function renderSummary(data) {
  let inc=0, exp=0;
  data.forEach(t => t.type==="income" ? inc+=+t.amount : exp+=+t.amount);
  const net = inc-exp;
  setText("totalIncome",  fmt(inc));
  setText("totalExpense", fmt(exp));
  setText("txCount",      data.length);
  const el = document.getElementById("netBalance");
  if (el) {
    el.textContent = (net>=0?"":"-")+fmt(Math.abs(net));
    el.className   = `stat-value font-semibold mt-1 ${net>=0?"text-indigo-600":"text-rose-500"}`;
  }
}

function renderList(data) {
  const el = document.getElementById("txList");
  if (!el) return;
  if (!data.length) {
    el.innerHTML = `<div class="text-center py-10 text-gray-300">
      <i class="fa-solid fa-inbox text-4xl mb-3 block"></i>
      <p>Chưa có giao dịch. Nhấn + để thêm!</p></div>`;
    return;
  }
  const sorted = [...data].sort((a,b)=>{
    let va=a[sortField], vb=b[sortField];
    if(sortField==="amount"){va=+va;vb=+vb;}
    return va<vb?sortDir:va>vb?-sortDir:0;
  });
  el.innerHTML = sorted.map(t => {
    const isInc = t.type==="income";
    return `<div class="flex items-center justify-between p-4 rounded-2xl border transition-all
        ${isInc?"border-emerald-100 bg-emerald-50 hover:bg-emerald-100"
                :"border-rose-100 bg-rose-50 hover:bg-rose-100"}">
      <div class="flex items-center gap-3 min-w-0">
        <div class="w-9 h-9 rounded-2xl flex items-center justify-center flex-shrink-0
          ${isInc?"bg-emerald-100 text-emerald-500":"bg-rose-100 text-rose-500"}">
          <i class="fa-solid ${isInc?"fa-arrow-trend-up":"fa-arrow-trend-down"} text-sm"></i>
        </div>
        <div class="min-w-0">
          <p class="font-medium text-gray-800 truncate text-sm">${esc(t.note)}</p>
          <p class="text-xs text-gray-400">${t.date} • ${t.category}</p>
        </div>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0 ml-2">
        <p class="font-semibold text-sm ${isInc?"text-emerald-600":"text-rose-500"}">
          ${isInc?"+":"-"}${(+t.amount).toLocaleString("vi-VN")}đ
        </p>
        <button onclick="deleteTransaction('${t.id}')"
          class="w-7 h-7 rounded-xl bg-white border border-gray-200 text-gray-300
                 hover:text-rose-400 hover:border-rose-200 flex items-center justify-center text-xs transition-all">
          <i class="fa-solid fa-trash"></i>
        </button>
      </div>
    </div>`;
  }).join("");
}

function renderCharts(data) {
  const catExp = {};
  data.filter(t=>t.type==="expense").forEach(t=>{
    catExp[t.category] = (catExp[t.category]||0) + (+t.amount);
  });
  const keys = Object.keys(catExp);
  const vals = Object.values(catExp);
  const clrs = keys.map(k=>CAT_COLORS[k]||"#64748b");

  // PIE
  if(pieChart){pieChart.destroy();pieChart=null;}
  if(keys.length){
    pieChart = new Chart(document.getElementById("pieChart"),{
      type:"doughnut",
      data:{ labels:keys, datasets:[{data:vals,backgroundColor:clrs,borderWidth:4,borderColor:"#fff"}] },
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ position:"bottom", labels:{font:{size:10},padding:10} } } }
    });
  }

  // BAR
  if(barChart){barChart.destroy();barChart=null;}
  if(keys.length){
    barChart = new Chart(document.getElementById("barChart"),{
      type:"bar",
      data:{ labels:keys, datasets:[{label:"Chi (đ)",data:vals,backgroundColor:clrs,borderRadius:8}] },
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{ y:{ticks:{callback:v=>(v/1e6).toFixed(1)+"tr",font:{size:10}}},
                 x:{ticks:{font:{size:10}}} } }
    });
  }

  // LINE
  const dates   = [...new Set(data.map(t=>t.date))].sort();
  const incData = dates.map(d=>data.filter(t=>t.date===d&&t.type==="income").reduce((s,t)=>s+(+t.amount),0));
  const expData = dates.map(d=>data.filter(t=>t.date===d&&t.type==="expense").reduce((s,t)=>s+(+t.amount),0));
  if(lineChart){lineChart.destroy();lineChart=null;}
  lineChart = new Chart(document.getElementById("lineChart"),{
    type:"line",
    data:{ labels:dates, datasets:[
      {label:"Thu nhập",data:incData,borderColor:"#10b981",backgroundColor:"rgba(16,185,129,.1)",fill:true,tension:.4,borderWidth:2.5,pointRadius:3},
      {label:"Chi tiêu",data:expData,borderColor:"#ef4444",backgroundColor:"rgba(239,68,68,.08)",fill:true,tension:.4,borderWidth:2.5,pointRadius:3}
    ]},
    options:{ responsive:true, maintainAspectRatio:false,
      scales:{ y:{ticks:{callback:v=>(v/1e6).toFixed(1)+"tr",font:{size:10}}} },
      plugins:{ legend:{position:"top",labels:{font:{size:11}}} } }
  });
}

function renderAll() {
  const data = getFiltered();
  renderSummary(data);
  renderList(data);
  renderCharts(data);
}

// ── MODAL ─────────────────────────────────────────────────────
window.openModal = () => {
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("t_date").value = new Date().toISOString().split("T")[0];
  document.getElementById("t_amount").value = "";
  document.getElementById("t_note").value   = "";
};
window.closeModal = () => document.getElementById("modal").classList.add("hidden");

window.setType = type => {
  document.getElementById("t_type").value = type;
  const e=document.getElementById("btnExpense"), i=document.getElementById("btnIncome");
  if(type==="expense"){
    e.className="flex-1 py-2.5 rounded-xl text-sm font-semibold bg-rose-500 text-white transition-all";
    i.className="flex-1 py-2.5 rounded-xl text-sm font-semibold text-gray-500 hover:text-gray-700 transition-all";
  } else {
    i.className="flex-1 py-2.5 rounded-xl text-sm font-semibold bg-emerald-500 text-white transition-all";
    e.className="flex-1 py-2.5 rounded-xl text-sm font-semibold text-gray-500 hover:text-gray-700 transition-all";
  }
};

window.setSortField = field => {
  if(sortField===field) sortDir*=-1; else { sortField=field; sortDir=-1; }
  renderAll();
};

// ── INIT ──────────────────────────────────────────────────────
// Fill category select
const sel = document.getElementById("t_category");
CATS.forEach(c => { const o=document.createElement("option"); o.value=o.textContent=c; sel.appendChild(o); });

document.getElementById("filterMonth").addEventListener("change", renderAll);

// Load data from Firestore
loadAll();
</script>

</body>
</html>
